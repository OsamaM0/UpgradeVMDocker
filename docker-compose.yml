# ==========================================================================
#  Odoo 18 development stack — deployed via Dokploy (Traefik reverse proxy)
#  - db   : PostgreSQL 16 (loopback-only port, never public)
#  - odoo : Odoo 18 (public via Traefik/HTTPS; loopback port for SSH tunnels)
# ==========================================================================
services:
  db:
    image: postgres:16
    container_name: ${PROJECT_NAME:-odoo18}-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in the Dokploy Environment tab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the Dokploy Environment tab}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data
    # Bind to localhost only — reachable via SSH tunnel, never exposed publicly.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  odoo:
    image: odoo:18.0
    container_name: ${PROJECT_NAME:-odoo18}-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${POSTGRES_USER:?Set POSTGRES_USER in the Dokploy Environment tab}
      PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the Dokploy Environment tab}
      # Consumed by docker/odoo-entrypoint.sh to render odoo.conf on startup.
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in the Dokploy Environment tab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the Dokploy Environment tab}
      POSTGRES_DB: ${POSTGRES_DB:-odoo18}
      ODOO_ADMIN_PASSWD: ${ODOO_ADMIN_PASSWD:?Set ODOO_ADMIN_PASSWD in the Dokploy Environment tab}
      LIST_DB: ${LIST_DB:-True}
      ADDONS_PATH: ${ADDONS_PATH:-/mnt/extra-addons}
      ODOO_WORKERS: ${ODOO_WORKERS:-2}
    entrypoint: ["/bin/sh", "/opt/odoo-entrypoint.sh"]
    volumes:
      - odoo-web-data:/var/lib/odoo          # filestore (persistent)
      - ./config/odoo.conf.template:/etc/odoo/odoo.conf.template:ro   # rendered to $ODOO_RC (/tmp) on startup
      - ./addons:/mnt/extra-addons            # custom addons
      - ./docker/odoo-entrypoint.sh:/opt/odoo-entrypoint.sh:ro
    # Bind to localhost only — public traffic arrives through Traefik.
    ports:
      - "127.0.0.1:${ODOO_PORT:-8069}:8069"
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # --- HTTP → HTTPS redirect ---
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}-web.rule=Host(`${DOMAIN:?Set DOMAIN in the Dokploy Environment tab}`)"
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}-web.entrypoints=web"
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}-web.middlewares=${PROJECT_NAME:-odoo18}-https"
      - "traefik.http.middlewares.${PROJECT_NAME:-odoo18}-https.redirectscheme.scheme=https"
      # --- Main HTTPS router (web UI on 8069) ---
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}.rule=Host(`${DOMAIN:?}`)"
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}.service=${PROJECT_NAME:-odoo18}"
      - "traefik.http.services.${PROJECT_NAME:-odoo18}.loadbalancer.server.port=8069"
      # --- WebSocket router (Odoo 18 gevent/longpolling on 8072) ---
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}-ws.rule=Host(`${DOMAIN:?}`) && PathPrefix(`/websocket`)"
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}-ws.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${PROJECT_NAME:-odoo18}-ws.service=${PROJECT_NAME:-odoo18}-ws"
      - "traefik.http.services.${PROJECT_NAME:-odoo18}-ws.loadbalancer.server.port=8072"

volumes:
  db-data:
  odoo-web-data:

networks:
  internal:
    driver: bridge
  # Shared network created/managed by Dokploy (Traefik lives here).
  dokploy-network:
    external: true
